<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엑티브아이티(주) 노사협의회 건의함</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F4F4F4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #C0392B; padding-bottom: 20px; }
        .header img { max-width: 150px; }
        .header h1 { margin: 15px 0 0; font-size: 24px; color: #333; }
        .notice { font-size: 14px; background-color: #eee; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .notice span.required { color: #C0392B; font-weight: bold; }
        .notice strong { color: #C0392B; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        label span.required { color: #C0392B; }
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; height: 150px; }
        .btn-submit { display: block; width: 100%; padding: 15px; background-color: #C0392B; color: #fff; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        .btn-submit:hover { background-color: #A93226; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="엑티브아이티(주) 로고">
        <h1>노사협의회 실명 건의함</h1>
    </div>

    <div class="notice">
        안녕하세요. 엑티브아이티 노사협의회입니다.<br>
        직원 여러분의 소중한 의견을 실시간으로 듣고자 합니다.<br>
        <strong class="required">*</strong>로 표시된 항목은 필수 입력사항이며, <strong>실명이 아닌 경우 건의사항 접수가 제한될 수 있습니다.</strong><br>
        본 사이트를 통한 건의는 비밀이 보장됩니다.
    </div>

    <form id="submissionForm" action="" method="POST">
        
        <div class="form-group">
            <label for="category">분류 <span class="required">*</span></label>
            <select id="category" name="category" required>
                <option value="" disabled selected>선택해주세요</option>
                <option value="고충 처리">고충 처리</option>
                <option value="제도 건의">제도 건의</option>
                <option value="협의회 안건">협의회 안건</option>
            </select>
        </div>

        <div class="form-group">
            <label for="title">제목 <span class="required">*</span></label>
            <input type="text" id="title" name="title" required placeholder="한 줄로 요약해주세요">
        </div>

        <div class="form-group">
            <label for="content">상세 내용 <span class="required">*</span></label>
            <textarea id="content" name="content" required placeholder="구체적인 상황이나 개선 아이디어를 적어주세요"></textarea>
        </div>

        <div class="form-group">
            <label for="name">성함 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="실명을 입력해주세요">
        </div>

        <div class="form-group">
            <label for="department">부서 <span class="required">*</span></label>
            <input type="text" id="department" name="department" required placeholder="부서명을 입력해주세요">
        </div>

        <button type="submit" class="btn-submit">건의사항 제출하기</button>
    </form>
</div>

</body>
</html>
