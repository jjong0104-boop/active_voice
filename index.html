<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엑티브아이티(주) 노사협의회 건의함</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jjong0104-boop.github.io/active_voice">
    <meta property="og:title" content="엑티브아이티(주) 노사협의회 건의함에 의견 제출하기">
    <meta property="og:description" content="회사 생활이나 복지 관련 건의사항이 있다면 언제든지 의견을 남겨주세요">
    <meta property="og:image" content="https://jjong0104-boop.github.io/active_voice/img1.jpg">
    <meta property="og:site_name" content="https://jjong0104-boop.github.io/active_voice/">
    <meta property="og:kakao:button_text" content="건의하기">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F4F4F4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #C0392B; padding-bottom: 20px; }
        .header img { max-width: 150px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 24px; color: #333; }
        
        .notice { font-size: 14px; background-color: #eee; padding: 15px; border-radius: 4px; margin-bottom: 20px; line-height: 1.6; }
        .notice strong { color: #C0392B; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        label span { color: #C0392B; }
        
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; height: 120px; }
        
        .btn-submit { display: block; width: 100%; padding: 15px; background-color: #C0392B; color: #fff; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background-color: #A93226; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; border-top: 10px solid #C0392B; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h2 { color: #C0392B; margin-top: 0; }
        .modal-content p { line-height: 1.6; font-size: 16px; margin-bottom: 25px; }
        .btn-close { background: #333; color: #fff; padding: 10px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="엑티브아이티_로고.png" alt="엑티브아이티(주) 로고" onerror="this.style.display='none'">
        <h1>노사협의회 건의함</h1>
    </div>

    <div class="notice">
        안녕하세요. 엑티브아이티 노사협의회입니다.<br>
        <strong>*</strong> 필수 항목은 빠짐없이 입력해주세요. <br>
        실명이 아닌 경우 건의사항 접수가 제한될 수 있습니다.
    </div>

    <form id="submissionForm">
        <div class="form-group">
            <label for="category">분류 <span>*</span></label>
            <select id="category" name="category" required>
                <option value="" disabled selected>선택해주세요</option>
                <option value="고충처리">고충처리</option>
                <option value="안건제출">안건제출</option>
            </select>
        </div>
        <div class="form-group">
            <label for="title">제목 <span>*</span></label>
            <input type="text" id="title" name="title" required placeholder="한 줄로 요약해주세요">
        </div>
        <div class="form-group">
            <label for="content">상세 내용 <span>*</span></label>
            <textarea id="content" name="content" required placeholder="구체적인 내용을 적어주세요"></textarea>
        </div>
        <div class="form-group">
            <label for="name">성함 <span>*</span></label>
            <input type="text" id="name" name="name" required placeholder="실명을 입력해주세요">
        </div>
        <div class="form-group">
            <label for="department">부서 <span>*</span></label>
            <input type="text" id="department" name="department" required placeholder="부서명을 입력해주세요">
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">건의사항 제출하기</button>
    </form>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>제출 완료!</h2>
        <p>성공적으로 접수되었습니다.<br>오늘 하루도 고생하셨습니다.<br><strong>노사협의회가 당신을 응원합니다!</strong></p>
        <button class="btn-close" onclick="location.reload()">닫기</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwG9dZFVz0ZudQVraZtSQXd2drU1b4-B85J1isr16lN5wauuFeZ4cukEQjq9Ip-Ap3jlg/exec';
    const form = document.getElementById('submissionForm');
    const modal = document.getElementById('modal');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = '제출 중...';

        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => { data[key] = value; });

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        })
        .then(() => {
            modal.style.display = 'flex';
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('오류가 발생했습니다. 다시 시도해주세요.');
            submitBtn.disabled = false;
            submitBtn.innerText = '건의사항 제출하기';
        });
    });
</script>

</body>
</html>
